<!DOCTYPE html>
<html class="staticrypt-html" lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Protected Page</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700&family=Dancing+Script:wght@600;700&family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">

        <style>
            :root{
                --cream:#ece3d2; --cream-deep:#ddd1bd; --paper:#f4eee1;
                --terracotta:#9e5526; --olive:#6c7444; --olive-deep:#5b6238;
                --ink:#4a443d; --muted:#766e62; --line:rgba(94,77,46,.18);
            }
            *{box-sizing:border-box;}

            .staticrypt-html{height:100%;}
            .staticrypt-body{height:100%;margin:0;}

            .staticrypt-content{
                height:100%;margin:0;
                background:radial-gradient(120% 80% at 50% -10%, #f1e9d9 0%, var(--cream) 60%);
                font-family:'Mulish',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
                color:var(--ink);
                -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
            }

            .staticrypt-page{
                min-height:100%;display:flex;align-items:center;justify-content:center;
                padding:24px;box-sizing:border-box;
            }

            .staticrypt-form{
                position:relative;z-index:1;
                background:var(--paper);
                width:100%;max-width:404px;
                margin:0 auto;padding:38px 34px 34px;
                text-align:center;
                border:1px solid var(--line);border-radius:18px;
                box-shadow:0 14px 40px rgba(74,68,61,.16);
            }

            .wed-hearts{display:flex;justify-content:center;gap:6px;margin:0 0 8px;}
            .wed-hearts svg{width:15px;height:15px;}
            .wed-hearts svg:nth-child(2){width:19px;height:19px;transform:translateY(-2px);}
            .wed-hearts svg path{fill:var(--olive);}

            .wed-names{
                font-family:'Fraunces',serif;font-weight:700;text-transform:uppercase;
                color:var(--terracotta);font-size:30px;line-height:1;letter-spacing:.01em;margin:0;
            }
            .wed-names .amp{font-weight:500;font-style:italic;}
            .wed-script{
                font-family:'Dancing Script',cursive;font-weight:600;
                color:var(--olive);font-size:23px;line-height:1;margin:3px 0 0;
            }

            .staticrypt-instructions{margin:14px 0 0;}
            .staticrypt-title{
                font-family:'Fraunces',serif;font-weight:600;
                color:var(--terracotta);font-size:1.22em;margin:0 0 4px;
            }
            .staticrypt-instructions p:not(.staticrypt-title){
                margin:0;color:var(--muted);font-size:15px;line-height:1.5;
            }

            .staticrypt-hr{margin:20px 0;border:0;border-top:1px dashed var(--line);}

            .staticrypt-password-container{
                position:relative;background:#fff;width:100%;
                border:1px solid var(--line);border-radius:999px;
                margin:0 0 14px;box-sizing:border-box;overflow:hidden;
            }
            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"]{
                background:inherit;border:0;outline:0;box-sizing:border-box;
                font-family:'Mulish',sans-serif;font-size:15px;color:var(--ink);
                padding:14px 44px 14px 20px;width:100%;
            }
            .staticrypt-form input::placeholder{color:#9b9183;}

            .staticrypt-toggle-password-visibility{
                cursor:pointer;height:18px;width:18px;opacity:.55;padding:13px;
                position:absolute;right:4px;top:50%;transform:translateY(-50%);
            }

            label.staticrypt-remember{
                display:flex;align-items:center;justify-content:center;gap:10px;
                font-size:14px;color:var(--ink);margin:0 0 16px;
            }
            .staticrypt-remember input[type="checkbox"]{
                accent-color:var(--olive);transform:scale(1.3);margin:0;
            }

            .staticrypt-form .staticrypt-decrypt-button{
                font-family:'Mulish',sans-serif;font-weight:700;letter-spacing:.04em;
                text-transform:uppercase;outline:0;cursor:pointer;
                background:var(--terracotta);color:#fff;width:100%;border:0;
                padding:14px;border-radius:999px;font-size:14px;
                transition:filter .18s ease;
            }
            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:active,
            .staticrypt-form .staticrypt-decrypt-button:focus{filter:brightness(92%);}

            .hidden{display:none !important;}

            .staticrypt-spinner-container{height:100%;display:flex;align-items:center;justify-content:center;
                background:radial-gradient(120% 80% at 50% -10%, #f1e9d9 0%, var(--cream) 60%);}
            .staticrypt-spinner{
                display:inline-block;width:2rem;height:2rem;vertical-align:text-bottom;
                border:0.25em solid var(--olive);border-right-color:transparent;border-radius:50%;
                animation:spinner-border 0.75s linear infinite;
            }
            @keyframes spinner-border{100%{transform:rotate(360deg);}}

            @media screen and (-webkit-min-device-pixel-ratio:0){
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"]{font-size:16px;}
            }
            @media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important;}}
        </style>
    </head>

    <body class="staticrypt-body">

                        <input type="submit" class="staticrypt-decrypt-button" value="OPEN" />
                    </form>
                </div>
            </div>
        </div>
